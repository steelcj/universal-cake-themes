dc:description: >
  An experimental grid-based web theme inspired by Piet Mondrian and
  the De Stijl movement. Uses asymmetrical CSS Grid segmentation and
  primary color blocks to express structural clarity and interdependent
  composition. Fully responsive and JavaScript-free.

